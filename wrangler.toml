name = "wallet-infra"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"
# account_id = "<your-cloudflare-account-id>"

# Custom domain — Cloudflare manages the sendbsv.com zone, so this
# Custom Domain auto-creates the proxied DNS record + TLS cert on deploy.
# (Do NOT also add a manual CNAME — the Custom Domain feature owns the record.)
routes = [
  { pattern = "storage.sendbsv.com", custom_domain = true }
]

[vars]
# Self-hosted chaintracks (BSVanon/chaintracks-cloudflare) exposing
# /findHeaderHexForHeight. ChainTracksProvider is primary; the storage server
# transparently falls back to direct WhatsOnChain calls when chaintracks
# errors or is mid-sync, so flipping `strict` is safe immediately after
# chaintracks deploy (it doesn't need a fully-synced header chain to be useful).
CHAINTRACKS_URL = "https://chaintracks.sendbsv.com"

# BEEF verification mode: "strict" | "log_only" | "skip"
#   strict   — hard-reject on bad merkle root (recommended for funds)
#   log_only — validate + log, return BEEF anyway
#   skip     — bypass tracker entirely (drain-time / emergency only)
# 2026-05-29: flipped to strict now that self-hosted chaintracks is live at
# chaintracks.sendbsv.com (D1+R2+cron) — primary with WoC fallback.
BEEF_VERIFICATION = "strict"

# Secrets (set via `wrangler secret put`):
#   ARC_API_KEY — TAAL ARC API key for broadcast acceleration (optional).
#   WOC_API_KEY — WhatsOnChain API key for fallback broadcast (optional).

[build]
command = "worker-build --release"

[[d1_databases]]
binding = "DB"
database_name = "wallet-infra"
database_id = "c0ec0482-009a-499d-8727-f44e6f8f5be2"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "wallet-infra-blobs"

# AUTH_SESSIONS Workers-KV binding removed on 2026-05-29 — BRC-103/104
# sessions now live in the `auth_sessions` table inside the `DB` D1
# database (migration `0003_auth_sessions.sql`). The KV namespace
# (id `57a886677d524983b488574f66349a1e`) is no longer referenced by
# this worker; it can be deleted from the Cloudflare dashboard once no
# in-flight sessions need to be honored. Backing change is in the
# `bsv-middleware-cloudflare` BSVanon fork's `D1SessionStorage` impl +
# the 30s `update_session` debounce — together those two changes drop
# this worker off the KV free-tier write quota entirely.

[triggers]
# Background monitor: re-broadcasts unconfirmed txs and reconciles state.
# */5 minutes is the conservative cadence. Tighter cadences combined with
# upstream rate limits (e.g. WoC 429s) can cascade — only adjust after
# observing the failure mode.
crons = ["*/5 * * * *"]
